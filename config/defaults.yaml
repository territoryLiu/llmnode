gateway:
  host: 0.0.0.0
  port: 4000
  api_key: dev-key
  backend_url: http://127.0.0.1:8000
  backend_model: qwen36-35b-a3b
  agent_base_url: http://127.0.0.1:4010
  agent_status_url: http://127.0.0.1:4010/state
  require_agent_ready: false
  queue_limit: 8
  execution_limit: 1

agent:
  host: 127.0.0.1
  port: 4010
  state: stopped
  poll_interval: 15
  auto_recover: true
  recovery_threshold: 2

schedule:
  timezone: Asia/Shanghai
  work_days:
    - mon
    - tue
    - wed
    - thu
    - fri
  start_time: "09:00"
  end_time: "18:00"
  auto_stop_enabled: true
  auto_start_enabled: true
  cooldown_minutes: 10

vllm:
  backend_type: vllm
  container_name: qwen36-vllm
  image_name: vllm/vllm-openai:nightly
  model_dir: models/Qwen/Qwen3.6-35B-A3B-FP8
  model_name: qwen36-35b-a3b
  host_port: 8000
  gpu_memory_utilization: 0.6
  tensor_parallel_size: 1
  max_model_len: 262144
  max_num_seqs: 4
  shm_size: 16g
  enable_auto_tool_choice: true
  reasoning_parser: qwen3
  tool_call_parser: qwen3_coder
