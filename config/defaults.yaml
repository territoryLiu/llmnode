gateway:
  host: 0.0.0.0
  port: 4000
  api_key: ""
  backend_request_timeout_seconds: 300
  agent_base_url: http://127.0.0.1:4010
  agent_status_url: http://127.0.0.1:4010/state
  require_agent_ready: false
  queue_limit: 8
  execution_limit: 1

agent:
  host: 127.0.0.1
  port: 4010
  state: stopped
  poll_interval: 15
  auto_recover: true
  recovery_threshold: 2
  startup_grace_period: 300

schedule:
  timezone: Asia/Shanghai
  work_days:
    - mon
    - tue
    - wed
    - thu
    - fri
  start_time: "09:00"
  end_time: "18:00"
  auto_stop_enabled: true
  auto_start_enabled: true
  cooldown_minutes: 10

active_backend_profile: vllm_qwen36-27b-awq-int4
