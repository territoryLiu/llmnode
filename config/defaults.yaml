gateway:
  host: 0.0.0.0
  port: 4000
  api_key: dev-key
  backend_url: http://127.0.0.1:8000
  backend_model: qwen36-35b-a3b
  agent_base_url: http://127.0.0.1:4010
  agent_status_url: http://127.0.0.1:4010/state
  require_agent_ready: false
  queue_limit: 8
  execution_limit: 1

agent:
  host: 127.0.0.1
  port: 4010
  state: stopped
  poll_interval: 15
  auto_recover: true
  recovery_threshold: 2
  startup_grace_period: 300

schedule:
  timezone: Asia/Shanghai
  work_days:
    - mon
    - tue
    - wed
    - thu
    - fri
  start_time: "09:00"
  end_time: "18:00"
  auto_stop_enabled: true
  auto_start_enabled: true
  cooldown_minutes: 10

# 切换后端：修改 backend_type 为 vllm / llama.cpp / sglang
# 同时调整对应的 image_name / model_dir / model_file 等参数
vllm:
  backend_type: vllm
  container_name: qwen36-vllm
  image_name: vllm/vllm-openai:nightly
  model_dir: models/Qwen/Qwen3.6-35B-A3B
  model_file: ""
  model_name: qwen36-35b-a3b
  host_port: 8000
  gpu_memory_utilization: 0.9
  tensor_parallel_size: 1
  max_model_len: 262144
  max_num_seqs: 4
  shm_size: 16g
  enable_auto_tool_choice: true
  reasoning_parser: qwen3
  tool_call_parser: qwen3_coder
  n_gpu_layers: -1
  ctx_size: 262144
  n_parallel: 4
  mem_fraction_static: 0.85
  max_running_requests: 4

# --- llama.cpp 后端示例（复制到 vllm 段替换即可）---
# 注意：必须使用 CUDA 镜像（:full-cuda 或 :b<build>-cuda），:full 为纯 CPU 镜像，--n-gpu-layers 会被忽略
